server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: любой неизвестный путь отдаёт index.html, чтобы клиентский роутер
    # мог сам обработать маршрут (например, /dashboard)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кеш для версионируемых ассетов Vite (имена с хешем)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Файлы из public/ (sample.xlsx и т.п.) — короткий кеш
    location ~* \.(xlsx|xls|csv|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # index.html не кешируем, чтобы пользователи видели свежий билд сразу
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # gzip-сжатие текстовых ресурсов
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Базовая безопасность
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
