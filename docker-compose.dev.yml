# =====================================================================
# Локальное окружение для разработки.
#
# Запуск:
#   docker compose -f docker-compose.dev.yml up -d --build
#
# После старта:
#   - MariaDB:  localhost:3306 (graph_from_data / gfd_user / gfd_pass)
#   - API:      http://localhost:8080/api/*
#   - Фронт:    запускайте отдельно через `npm run dev` (порт 5173)
#
# Админ по умолчанию: admin / admin123
# =====================================================================

services:

  db:
    image: mariadb:10.11
    container_name: gfd-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: graph_from_data
      MARIADB_USER: gfd_user
      MARIADB_PASSWORD: gfd_pass
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # Скрипты в /docker-entrypoint-initdb.d/ выполняются ОДНИН РАЗ
      # при создании пустой БД. Чтобы перезалить — удалите volume: docker compose down -v
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gfd-api:dev
    container_name: gfd-api
    restart: unless-stopped
    environment:
      GFD_DB_HOST: db
      GFD_DB_PORT: 3306
      GFD_DB_NAME: graph_from_data
      GFD_DB_USER: gfd_user
      GFD_DB_PASS: gfd_pass
      GFD_DB_CHARSET: utf8mb4
      # Для локальной разработки разрешаем фронт Vite
      GFD_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      GFD_MAX_UPLOAD_SIZE: "20971520"  # 20 MB
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      # Маунт исходников для горячей правки PHP без пересборки образа
      - ./backend:/var/www/html
      # uploads — именованный volume, чтобы файлы переживали пересборку
      - apiuploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  # Одноразовый сервис: создаёт админа после старта БД.
  # `docker compose run --rm admin-setup` или поднимается автоматически.
  admin-setup:
    image: gfd-api:dev
    container_name: gfd-admin-setup
    profiles: ["setup"]
    environment:
      GFD_DB_HOST: db
      GFD_DB_PORT: 3306
      GFD_DB_NAME: graph_from_data
      GFD_DB_USER: gfd_user
      GFD_DB_PASS: gfd_pass
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    command: ["php", "scripts/create_admin.php", "admin", "admin123"]
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  dbdata:
  apiuploads:
